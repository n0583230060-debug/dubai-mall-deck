<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D1117" />

    <!-- Primary meta -->
    <meta name="description" content="The Dubai Mall — The World's Most Visited Destination. 105M annual visitors. Retail Leasing, Sponsorship & Events." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="The Dubai Mall | Sales Experience" />
    <meta property="og:description" content="The world's most visited destination. 105M annual visitors. Explore retail leasing, sponsorship and events opportunities." />
    <meta property="og:site_name"   content="The Dubai Mall" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="The Dubai Mall | Sales Experience" />
    <meta name="twitter:description" content="105M annual visitors. The world's most visited destination." />

    <title>The Dubai Mall | Sales Experience</title>

    <!-- Preconnect for Google Fonts (non-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700&display=swap" />
    </noscript>

    <!-- Preconnect for YouTube (loaded deferred) -->
    <link rel="preconnect" href="https://www.youtube.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
